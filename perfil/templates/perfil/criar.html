{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block conteudo %}

<div class="col-lg mt-3">
    <div class="col-lg-6 offset-lg-3">
        <h4>Cadastro</h4>

        <form method="post">
            {% csrf_token %}

            {{ user_form|crispy }}
            {{ perfil_form|crispy }}
            <div class="row">
                <div class="col">
                    <button type="submit" class="btn btn-primary btn-block mt-3">
                        Cadastrar
                    </button>
                </div>
            </div>
        </form>
        <p class="mt-3 text-center">
            Já tem uma conta?
            <a href="{% url 'perfil:login' %}">Faça login</a>
        </p>
    </div>
</div>

{% endblock %}
