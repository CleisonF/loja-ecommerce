{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block conteudo %}


<div class="row">

    {% if not request.user.is_authenticated %}
    <div class="col-lg mt-3">
        <h4>Login</h4>
        <form method="post" action="{% url 'perfil:criar' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="InputUsuario1">Usúario</label>
                <input type="text" name="username" class="form-control" id="InputUsuario1" aria-describedby="usernameHelp"
                 placeholder="Digite seu usúario">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" class="form-control" id="password" placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
        </form>
    {% endif %}
    <div class="col-lg mt-3">

        <h4>Cadastro</h4>

        <form method="post" action="">
            {% csrf_token %}
            {{ user_form|crispy }}
            {{ perfil_form|crispy }}
            <div class="row">
                <div class="col">
                    <button type="submit" class="btn btn-primary">
                        Enviar
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}
