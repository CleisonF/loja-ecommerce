{% extends "base.html" %}

{% block conteudo %}

<form method="post" action="{% url 'perfil:login' %}">
    {% csrf_token %}

    <div class="form-group">
        <label for="InputUsuario1">Usúario</label>
        <input type="text" name="username" class="form-control" id="InputUsuario1" aria-describedby="usernameHelp"
         placeholder="Digite seu usúario">
    </div
    >
    <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" name="password" class="form-control" id="password" placeholder="Digite sua senha">
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg">
        Entrar
    </button>
</form>

<p class="mt-3">
    Não tem uma conta? <a href="{% url 'perfil:criar' %}">Cadastre-se</a>
</p>

{% endblock %}
